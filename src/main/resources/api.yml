openapi: 3.1.1

info:
  title: Cakelator API
  version: 0.0.1

servers:
  - url: http://localhost:8080

tags:
  - name: Auth
    description: Auth endpoints.
  - name: Users
    description: User profile endpoints.
  - name: User Settings
    description: Locale/currency/base units settings.
  - name: Locales
    description: Locale reference endpoints.
  - name: Currencies
    description: Currency reference endpoints.
  - name: Units
    description: Units reference endpoints.
  - name: Products
    description: Ingredients/products CRUD.
  - name: Package Prices
    description: Product package price history.
  - name: Desserts
    description: Desserts CRUD.
  - name: Components
    description: Components CRUD.
  - name: Dessert Components
    description: Link desserts with components.
  - name: Component Items
    description: Link components with products and quantities.
  - name: Calculations
    description: Calculation runs and their items.

paths:
  /auth/sign-up:
    post:
      summary: Sign up a new user.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/sign-in:
    post:
      summary: Sign in.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: OK
