<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Component Items - Cacelator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

    <header class="header">
        <h1 class="logo">Cacelator</h1>

        <nav class="nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="products.html" class="nav-link">Products</a>
            <a href="components.html" class="nav-link">Components</a>
            <a href="component-items.html" class="nav-link">Component Items</a>
        </nav>
    </header>

    <main class="main-content">

        <!-- Форма -->
        <section class="features">
            <h2 class="section-title">Add Product to Component</h2>

            <div class="form-block">

                <select id="componentSelect"></select>

                <select id="productSelect"></select>

                <input id="quantity" type="number" placeholder="Quantity">

                <input id="unit" type="text" placeholder="Unit (g, ml)">

                <button class="primary-btn" onclick="addItem()">Add</button>

            </div>
        </section>

        <!-- Таблица -->
        <section class="table-section">
            <h2 class="section-title">Component Items</h2>

            <table class="ingredients-table">
                <thead>
                <tr>
                    <th>Component</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Unit</th>
                </tr>
                </thead>
                <tbody id="itemsTable"></tbody>
            </table>
        </section>

    </main>

</div>

<script src="component-items.js"></script>

</body>
</html>
