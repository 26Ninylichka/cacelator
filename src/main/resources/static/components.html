<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cakelator Components</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            margin-right: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .add-btn {
            background: #4CAF50;
            color: white;
        }

        .delete-btn {
            background: #ff4d4f;
            color: white;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        td, th {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .empty {
            text-align: center;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🎂 Components</h2>

    <input id="name" placeholder="Component name">
    <input id="description" placeholder="Description">

    <button class="add-btn" onclick="createComponent()">➕ Add</button>

    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Description</th>
            <th></th>
        </tr>
        </thead>
        <tbody id="componentsTableBody"></tbody>
    </table>

</div>

<script src="components.js"></script>

</body>
</html>
