<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products - Cacelator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

    <header class="header">
        <h1 class="logo">Cacelator</h1>

        <nav class="nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="products.html" class="nav-link">Products</a>
            <a href="#" class="nav-link">Components</a>
            <a href="#" class="nav-link">Desserts</a>
        </nav>
    </header>

    <main class="main-content">

        <section class="features">
            <h2 class="section-title">Create Product</h2>

            <div class="form-block">
                <input id="productName" type="text" placeholder="Product name">
                <input id="productUnit" type="text" placeholder="Unit (g, ml, pcs)">

                <button class="primary-btn" onclick="createProduct()">Create</button>
            </div>
        </section>

        <section class="table-section">
            <h2 class="section-title">Products</h2>

            <table class="ingredients-table">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Unit</th>
                </tr>
                </thead>
                <tbody id="productsTable"></tbody>
            </table>
        </section>

    </main>

</div>

<script src="products.js"></script>

</body>
</html>
